<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrustaScope - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .crab-logo-text { color: #2F64C4; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-gray-900 antialiased h-screen flex flex-col pt-16">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 fixed top-0 left-0 right-0 z-20">
        <div class="flex items-center gap-3 w-64">
            <img src="/static/CrustaScope.png" alt="CrustaScope Logo" class="h-9 object-contain" onerror="this.src='https://via.placeholder.com/36x36?text=C'">
            <span class="text-[1.35rem] font-bold crab-logo-text tracking-tight">CrustaScope</span>
        </div>
    </header>

    <div class="flex-1 flex items-center justify-center p-6 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');">
        <div class="bg-white/95 backdrop-blur-sm rounded-xl shadow-xl border border-gray-100 p-8 w-full max-w-[400px]">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h1>
                <p class="text-gray-500 text-sm">Please sign in to your CrustaScope account</p>
            </div>

            {% if error %}
            <div class="bg-red-50 text-red-600 border border-red-200 text-sm rounded-lg p-3 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/login" method="POST" class="flex flex-col gap-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                           placeholder="Enter your username">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                           placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-[#2F64C4] hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors mt-2 shadow-sm">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
