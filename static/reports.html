<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrustaScope - Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom scrollbar to match clean design */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .crab-logo-text {
      color: #2F64C4;
    }
  </style>
</head>

<body class="bg-[#f8f9fa] text-gray-900 antialiased overflow-x-hidden">
  <!-- Top Header -->
  <header
    class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 fixed top-0 left-0 right-0 z-20">
    <div class="flex items-center gap-3 w-64">
      <img src="/static/CrustaScope.png" alt="CrustaScope Logo" class="h-16 object-contain">
      <span class="text-[1.35rem] font-bold crab-logo-text tracking-tight">CrustaScope</span>
    </div>
    <div class="text-gray-500 flex justify-end text-sm font-medium">
      Mon, Dec 1 &bull; 05:18 PM
    </div>
  </header>

  <div class="flex h-screen pt-16">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between z-10 fixed top-16 bottom-0">
      <nav class="p-4 flex flex-col gap-1.5">
        <a href="/"
          class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 border border-transparent rounded-lg font-medium transition-colors">
          <i class="fa-solid fa-border-all text-lg w-5 text-center"></i>
          <span>Dashboard</span>
        </a>
        <a href="/camera"
          class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 border border-transparent rounded-lg font-medium transition-colors">
          <i class="fa-solid fa-camera text-lg w-5 text-center"></i>
          <span>Camera Live Feed</span>
        </a>
        <a href="/reports"
          class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg font-medium transition-colors">
          <i class="fa-regular fa-file-lines text-lg w-5 text-center"></i>
          <span>Reports</span>
        </a>
        <a href="/settings"
          class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 border border-transparent rounded-lg font-medium transition-colors">
          <i class="fa-solid fa-gear text-lg w-5 text-center"></i>
          <span>Settings</span>
        </a>
      </nav>
      <div class="p-4 mt-auto">
        <div class="text-center px-4 py-2 bg-gray-50 text-gray-500 text-sm rounded border border-gray-200">
          Version: 1.0.0v
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 p-6 md:p-8 overflow-y-auto w-full">
      <div class="max-w-[1400px] mx-auto">
        <div
          class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div>
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Detection Reports</h1>
            <p class="text-gray-500 text-sm">View and manage WSSV and healthy shrimp detection snapshots</p>
          </div>
          <button onclick="loadSnaps()"
            class="flex items-center justify-center gap-2 bg-[#2F64C4] hover:bg-blue-700 text-white font-medium text-sm px-4 py-2 rounded-lg shadow-sm transition-colors whitespace-nowrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
              stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
            </svg>
            Refresh Data
          </button>
        </div>

        <div
          class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 mb-6 flex flex-col md:flex-row items-center justify-between gap-4 w-full">
          <div class="relative w-full md:w-[28rem]">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-300 text-sm"></i>
            <input type="text" placeholder="Search detections..."
              class="w-full pl-10 pr-4 py-2 border border-gray-100 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm text-gray-800 placeholder-gray-400">
          </div>
          <div class="flex items-center gap-2 shrink-0 bg-gray-50/80 p-1 rounded-lg">
            <button id="btn-all" onclick="setFilter('all')"
              class="px-5 py-1.5 bg-[#2F64C4] text-white text-[13px] font-semibold rounded-[0.4rem] shadow-sm">All</button>
            <button id="btn-wssv" onclick="setFilter('wssv')"
              class="px-5 py-1.5 text-gray-600 text-[13px] font-semibold rounded-[0.4rem] hover:bg-gray-100 transition-colors">WSSV</button>
            <button id="btn-healthy" onclick="setFilter('healthy')"
              class="px-5 py-1.5 text-gray-600 text-[13px] font-semibold rounded-[0.4rem] hover:bg-gray-100 transition-colors">Healthy</button>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-6 overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-100">
            <h2 class="text-base font-bold text-gray-900">Detection Snapshots</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-gray-600">
              <thead
                class="text-[10px] uppercase bg-gray-50 text-gray-400 font-bold border-b border-gray-100 tracking-wider">
                <tr>
                  <th scope="col" class="px-6 py-3.5 font-bold">ID</th>
                  <th scope="col" class="px-6 py-3.5 font-bold">IMAGE</th>
                  <th scope="col" class="px-6 py-3.5 font-bold">TYPE</th>
                  <th scope="col" class="px-6 py-3.5 font-bold">LABEL</th>
                  <th scope="col" class="px-6 py-3.5 font-bold">CONFIDENCE</th>
                  <th scope="col" class="px-6 py-3.5 font-bold whitespace-nowrap">CAMERA INDEX</th>
                  <th scope="col" class="px-6 py-3.5 font-bold">TIMESTAMP</th>
                  <th scope="col" class="px-6 py-3.5 font-bold text-right pr-12">ACTIONS</th>
                </tr>
              </thead>
              <tbody id="snaps-table-body" class="divide-y divide-gray-100">
                <!-- JS Injected content -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  </div>

  <!-- Image Modal -->
  <div id="image-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 hidden"
    onclick="closeModal()">
    <img id="modal-img" src="" class="max-w-full max-h-[90vh] object-contain rounded shadow-2xl"
      onclick="event.stopPropagation()">
    <button onclick="closeModal()"
      class="absolute top-4 right-6 text-white text-3xl hover:text-gray-300 transition-colors">&times;</button>
  </div>

  <script>
    let currentFilter = 'all';
    let allSnaps = [];

    function setFilter(filter) {
      currentFilter = filter;

      // Adjust styles
      const btns = {
        'all': document.getElementById('btn-all'),
        'wssv': document.getElementById('btn-wssv'),
        'healthy': document.getElementById('btn-healthy')
      };

      for (let k in btns) {
        if (k === filter) {
          btns[k].className = 'px-5 py-1.5 bg-[#2F64C4] text-white text-[13px] font-semibold rounded-[0.4rem] shadow-sm';
        } else {
          btns[k].className = 'px-5 py-1.5 text-gray-600 text-[13px] font-semibold rounded-[0.4rem] hover:bg-gray-100 transition-colors';
        }
      }

      renderSnaps();
    }

    async function loadSnaps() {
      try {
        const [resWssv, resHealthy] = await Promise.all([
          fetch('/snaps?kind=wssv').then(r => r.json()),
          fetch('/snaps?kind=healthy').then(r => r.json())
        ]);

        const wssvList = (resWssv.items || []).map(i => ({ ...i, kind: 'wssv' }));
        const healthyList = (resHealthy.items || []).map(i => ({ ...i, kind: 'healthy' }));

        allSnaps = [...wssvList, ...healthyList].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        renderSnaps();
      } catch (err) {
        console.error('Failed to load snaps', err);
      }
    }

    function renderSnaps() {
      const tbody = document.getElementById('snaps-table-body');
      tbody.innerHTML = '';

      const filtered = allSnaps.filter(s => currentFilter === 'all' || s.kind === currentFilter);

      // Update counts in buttons (Optional UI polish)
      document.getElementById('btn-all').innerText = `All (${allSnaps.length})`;
      document.getElementById('btn-wssv').innerText = `WSSV (${allSnaps.filter(s => s.kind === 'wssv').length})`;
      document.getElementById('btn-healthy').innerText = `Healthy (${allSnaps.filter(s => s.kind === 'healthy').length})`;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-gray-500 text-sm">No detections found.</td></tr>`;
        return;
      }

      filtered.forEach(snap => {
        const date = new Date(snap.created_at).toLocaleString();
        const idShort = snap.id.substring(0, 12) + '...';
        const confidence = (snap.confidence * 100).toFixed(2) + '%';

        let badgeClass = 'border-green-200/50 bg-[#eefaf3] text-[#10b981]';
        let badgeText = 'Healthy';

        if (snap.kind === 'wssv') {
          badgeClass = 'border-red-200/50 bg-[#fef2f2] text-[#ef4444]';
          badgeText = 'WSSV';
        }

        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50/50 transition-colors';
        tr.innerHTML = `
                  <td class="px-6 py-4 whitespace-nowrap text-[12px] font-medium text-gray-400">${idShort}</td>
                  <td class="px-6 py-3">
                    <div class="h-10 w-14 bg-gray-200 rounded object-cover overflow-hidden border border-gray-200 cursor-pointer" onclick="viewImage('${snap.kind}', '${snap.id}')">
                      <img src="/snap_image/${snap.kind}/${snap.id}" alt="Thumbnail" class="h-full w-full object-cover">
                    </div>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-2.5 py-1 text-[10px] font-bold tracking-wide rounded border ${badgeClass}">${badgeText}</span>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-[13px] font-medium text-gray-700">${snap.label}</td>
                  <td class="px-6 py-4 whitespace-nowrap text-[12px] text-gray-600 font-medium">${confidence}</td>
                  <td class="px-6 py-4 whitespace-nowrap text-[12px] font-medium text-gray-600">0</td>
                  <td class="px-6 py-4 whitespace-nowrap text-[12px] text-gray-400 font-medium">${date}</td>
                  <td class="px-6 py-4 whitespace-nowrap text-right pr-6">
                    <div class="flex items-center justify-end gap-3.5">
                      <button onclick="viewImage('${snap.kind}', '${snap.id}')" class="text-[#2F64C4] hover:text-blue-800 transition-colors" title="View"><i class="fa-regular fa-image text-sm"></i></button>
                      <a href="/download/${snap.kind}/${snap.id}?fmt=jpg" class="text-green-500 hover:text-green-700 transition-colors" title="Download"><i class="fa-solid fa-download text-sm"></i></a>
                      <button onclick="deleteSnap('${snap.kind}', '${snap.id}')" class="text-red-500 hover:text-red-700 transition-colors" title="Delete"><i class="fa-regular fa-trash-can text-sm"></i></button>
                    </div>
                  </td>
                `;
        tbody.appendChild(tr);
      });
    }

    function deleteSnap(kind, id) {
      if (confirm("Are you sure you want to delete this snapshot?")) {
        fetch('/snap/' + kind + '/' + id, { method: 'DELETE' })
          .then(r => r.json())
          .then(() => loadSnaps())
          .catch(e => console.error("Deletion failed", e));
      }
    }

    function viewImage(kind, id) {
      document.getElementById('modal-img').src = '/snap_image/' + kind + '/' + id;
      document.getElementById('image-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('image-modal').classList.add('hidden');
      document.getElementById('modal-img').src = '';
    }

    // Initialize
    loadSnaps();
  </script>
</body>

</html>
